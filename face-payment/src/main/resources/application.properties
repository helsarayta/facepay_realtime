# Server
server.port=8080

# PostgreSQL — defaults for local, overridden by env vars in Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/facepaymentdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:facepayment}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:facepayment123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Python Face Service — defaults for local, overridden by env vars in Docker
face.service.url=${FACE_SERVICE_URL:http://localhost:8000}

# JWT
jwt.secret=${JWT_SECRET:facepayment-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration-ms=86400000

# Multipart uploads (face images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
